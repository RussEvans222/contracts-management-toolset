<template>
    <lightning-card title="ABC360 Updates" icon-name="custom:custom63">
        <div slot="actions" class="slds-grid slds-grid_vertical-align-center">
            
            <template if:true={isDeployDisabled}>
                <lightning-button 
                    label="Installations in Progress; Check Status" 
                    title="Installations in Progress; Check Status"
                    onclick={handleCheckStatus}
                    class="slds-m-right_small"
                    icon-name="utility:refresh">
                </lightning-button>
            </template>

            <template if:false={isDeployDisabled}>
                <lightning-button 
                    label="Deploy Selected" 
                    variant="brand" 
                    onclick={handleDeploy} 
                    disabled={isNoneSelected}
                    class="slds-m-right_small">
                </lightning-button>
            </template>

            <lightning-input 
                name="enter-search" 
                type="search" 
                placeholder="Search Name..."
                variant="label-hidden"
                onchange={handleSearchChange}>
            </lightning-input>
        </div>

        <div class="slds-p-around_medium">
            <template if:true={records}>
                <div style="height: 400px;">
                    <lightning-datatable
                        key-field="Id"
                        data={records}
                        columns={columns}
                        onrowselection={handleRowSelection}
                        onrowaction={handleRowAction}>
                    </lightning-datatable>
                </div>
            </template>
            
            <template if:true={error}>
                <div class="slds-text-color_error slds-p-top_medium">
                    {error}
                </div>
            </template>
        </div>
    </lightning-card>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">Details</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={selectedVideoUrl}>
                        <div class="video-container slds-m-bottom_medium" style="background:#000; padding:1rem; border-radius:4px; text-align:center;">
                            <iframe 
                                src={selectedVideoUrl}
                                width="640" 
                                height="360" 
                                frameborder="0" 
                                allowfullscreen
                                allow="autoplay; fullscreen">
                            </iframe>
                        </div>
                    </template>

                    <div class="slds-box slds-theme_shade">
                        <p class="slds-text-title_caps slds-m-bottom_small">Description</p>
                        <lightning-formatted-rich-text 
                            value={selectedDescription}
                            class="slds-text-body_regular">
                        </lightning-formatted-rich-text>
                    </div>
                </div>

                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeModal}>Close</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showLastExecutionStatus}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeStatusModal}>
                        <lightning-icon icon-name="utility:close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <div class="slds-align_absolute-center">
                        <span class="slds-icon_container slds-m-right_small" title="Status">
                            <lightning-icon icon-name={lastExecutionStatusIcon} variant={lastExecutionStatusClass} size="medium"></lightning-icon>
                        </span>
                        <h2 class="slds-text-heading_medium">{lastExecutionStatusTitle}</h2>
                    </div>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-text-align_center slds-text-body_regular slds-m-bottom_medium">
                        <lightning-formatted-rich-text value={lastExecutionDescription}></lightning-formatted-rich-text>
                    </div>

                    <template if:true={stackTrace}>
                        <ul class="slds-accordion">
                            <li class="slds-accordion__list-item">
                                <section class={accordionSectionClass}>
                                    <div class="slds-accordion__summary">
                                        <h2 class="slds-accordion__summary-heading">
                                            <button class="slds-button slds-button_reset slds-accordion__summary-action" onclick={toggleStackTrace} aria-expanded={showStackTrace}>
                                                <lightning-icon icon-name="utility:switch" size="x-small" class="slds-accordion__summary-action-icon slds-button__icon slds-button__icon_left"></lightning-icon>
                                                <span class="slds-accordion__summary-content">View Stack Trace</span>
                                            </button>
                                        </h2>
                                    </div>
                                    <div class="slds-accordion__content">
                                        <div class="slds-text-align_right slds-m-bottom_x-small">
                                            <template if:false={isCopied}>
                                                <lightning-button label="Copy to Clipboard" icon-name="utility:copy_to_clipboard" onclick={onClickCopyToClipboard}></lightning-button>
                                            </template>
                                            <template if:true={isCopied}>
                                                <lightning-button label="Copied to Clipboard" icon-name="utility:check" variant="success"></lightning-button>
                                            </template>
                                        </div>
                                        <div class="slds-box slds-box_x-small slds-theme_shade" style="max-height: 250px; overflow-y: auto;">
                                            <lightning-formatted-rich-text value={stackTrace}></lightning-formatted-rich-text>
                                        </div>
                                    </div>
                                </section>
                            </li>
                        </ul>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeStatusModal}>Close</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    
    <template if:true={showSpinner}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>
</template>
