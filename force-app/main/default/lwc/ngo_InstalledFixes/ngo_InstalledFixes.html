<template>
    <lightning-card title="Installation History" icon-name="standard:task">
        <div class="slds-p-around_medium">
            <template if:true={records}>
                <div style="height: 400px;">
                    <lightning-datatable
                        key-field="Id"
                        data={records}
                        columns={columns}
                        hide-checkbox-column
                        onrowaction={handleRowAction}>
                    </lightning-datatable>
                </div>
            </template>
            
            <template if:true={error}>
                <div class="slds-text-color_error slds-p-top_medium">
                    {error}
                </div>
            </template>
        </div>
    </lightning-card>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">Fix Details</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={selectedVideoUrl}>
                        <div class="video-container slds-m-bottom_medium" style="background:#000; padding:1rem; border-radius:4px; text-align:center;">
                            <iframe 
                                src={selectedVideoUrl}
                                width="640" 
                                height="360" 
                                frameborder="0" 
                                allowfullscreen
                                allow="autoplay; fullscreen">
                            </iframe>
                        </div>
                    </template>

                    <div class="slds-box slds-theme_shade">
                        <p class="slds-text-title_caps slds-m-bottom_small">Description</p>
                        <lightning-formatted-rich-text 
                            value={selectedDescription}
                            class="slds-text-body_regular">
                        </lightning-formatted-rich-text>
                    </div>
                </div>

                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeModal}>Close</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
